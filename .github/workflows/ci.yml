name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.15.0
          package-manager-cache: false
      - name: Install release toolchain
        run: npm ci
      - name: Test release toolchain
        run: npm test
      - name: Build embedded ARS/2 collector assets
        run: go run ./cmd/ars-build --assets-only
      - name: Install tmux on macOS
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: Test disposable tmux and PTY flow
        run: |
          tmux -V
          go test ./internal/runtime -run TestDisposableTmux -count=1 -v
          go test ./internal/tui -run TestPTYAttachDetachRestoresTUI -count=1 -v
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build local ars
        run: go run ./cmd/ars-build

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install release toolchain
        run: npm ci
      - name: Preflight release package
        run: |
          go run ./cmd/ars-build --release 0.0.0
          (cd dist && sha256sum --check SHA256SUMS)
          npm pack ./dist/npm --dry-run
          npm pack ./dist/npm --pack-destination "$RUNNER_TEMP"
          npm install --global --prefix "$RUNNER_TEMP/ars-prefix" "$RUNNER_TEMP/baleen37-ars-0.0.0.tgz"
          mkdir -p "$RUNNER_TEMP/config/ars"
          printf '%s\n' localhost | tee "$RUNNER_TEMP/config/ars/hosts" "$RUNNER_TEMP/config/ars/local-host" >/dev/null
          XDG_CONFIG_HOME="$RUNNER_TEMP/config" "$RUNNER_TEMP/ars-prefix/bin/ars" list --json | grep -F '"schema_version":1'
      - name: Preview release
        run: npm run release -- --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
